<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0f1a"/>
      <stop offset="1" stop-color="#1e2230"/>
    </linearGradient>
    <linearGradient id="hwy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2438"/>
      <stop offset="1" stop-color="#171224"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- note highway (perspective) -->
  <polygon points="770,40 1030,40 1160,320 640,320" fill="url(#hwy)"/>
  <!-- lane lines -->
  <line x1="770" y1="40" x2="640" y2="320" stroke="#4a3f6b" stroke-width="3"/>
  <line x1="835" y1="40" x2="770" y2="320" stroke="#3a3255" stroke-width="2"/>
  <line x1="900" y1="40" x2="900" y2="320" stroke="#3a3255" stroke-width="2"/>
  <line x1="965" y1="40" x2="1030" y2="320" stroke="#3a3255" stroke-width="2"/>
  <line x1="1030" y1="40" x2="1160" y2="320" stroke="#4a3f6b" stroke-width="3"/>
  <!-- fret cross lines -->
  <line x1="757" y1="68" x2="1043" y2="68" stroke="#4a3f6b" stroke-width="2"/>
  <line x1="738" y1="110" x2="1062" y2="110" stroke="#4a3f6b" stroke-width="2"/>
  <line x1="713" y1="165" x2="1087" y2="165" stroke="#4a3f6b" stroke-width="3"/>
  <line x1="682" y1="232" x2="1118" y2="232" stroke="#4a3f6b" stroke-width="3"/>
  <!-- hit line -->
  <line x1="655" y1="290" x2="1145" y2="290" stroke="#f5a623" stroke-width="6" filter="url(#glow)"/>

  <!-- note gems -->
  <circle cx="806" cy="68" r="10" fill="#4cd681" filter="url(#glow)"/>
  <circle cx="900" cy="110" r="12" fill="#e05563" filter="url(#glow)"/>
  <circle cx="1012" cy="165" r="15" fill="#4da3ff" filter="url(#glow)"/>
  <circle cx="762" cy="232" r="18" fill="#f5d34c" filter="url(#glow)"/>
  <circle cx="900" cy="290" r="21" fill="#4cd681" filter="url(#glowBig)"/>
  <circle cx="900" cy="290" r="9" fill="#eafff2"/>

  <!-- guitar silhouette -->
  <g transform="translate(140,282) rotate(-4)" fill="#f5a623" filter="url(#glow)">
    <!-- neck -->
    <rect x="90" y="-7" width="230" height="14" rx="4"/>
    <!-- headstock -->
    <path d="M320,-9 L360,-14 Q372,0 360,14 L320,9 Z"/>
    <circle cx="338" cy="-18" r="3.5"/><circle cx="350" cy="-19.5" r="3.5"/><circle cx="362" cy="-21" r="3.5"/>
    <circle cx="338" cy="18" r="3.5"/><circle cx="350" cy="19.5" r="3.5"/><circle cx="362" cy="21" r="3.5"/>
    <!-- body -->
    <path d="M95,0 C95,-38 60,-52 32,-46 C4,-40 -8,-18 -4,2 C-8,22 4,42 32,47 C62,52 95,36 95,0 Z"/>
    <!-- sound hole -->
    <circle cx="48" cy="0" r="16" fill="#1e2230"/>
    <!-- strings -->
    <line x1="20" y1="-3" x2="330" y2="-3" stroke="#1e2230" stroke-width="1.4"/>
    <line x1="20" y1="0" x2="330" y2="0" stroke="#1e2230" stroke-width="1.4"/>
    <line x1="20" y1="3" x2="330" y2="3" stroke="#1e2230" stroke-width="1.4"/>
  </g>

  <!-- title -->
  <text x="80" y="120" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900"
        fill="#e8eaf2" letter-spacing="2">FRETBOARD</text>
  <text x="80" y="185" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900"
        fill="#f5a623" letter-spacing="2" filter="url(#glow)">HERO</text>
  <text x="83" y="220" font-family="Arial, sans-serif" font-size="20" fill="#8b91a8"
        letter-spacing="1">Learn guitar. Play the game. Your guitar is the controller.</text>

  <!-- star sparkles -->
  <path d="M575,85 L581,103 L600,103 L585,114 L591,132 L575,121 L559,132 L565,114 L550,103 L569,103 Z"
        fill="#f5d34c" filter="url(#glow)"/>
  <path d="M615,45 L619,57 L631,57 L621,64 L625,76 L615,69 L605,76 L609,64 L599,57 L611,57 Z"
        fill="#f5d34c" opacity="0.7"/>
  <path d="M545,150 L548,159 L557,159 L550,164 L553,173 L545,168 L537,173 L540,164 L533,159 L542,159 Z"
        fill="#f5d34c" opacity="0.5"/>
</svg>
